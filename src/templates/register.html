<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('app.title.register') }}</title>
    <link rel="icon" type="image/png" href="{{ base_path }}/static/favicon.png">
    <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>

<body>
    <main class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">{{ t('app.name') }}</h1>
            <p class="auth-subtitle">{{ t('auth.register.subtitle') }}</p>

            {% if errors %}
            <div class="messages">
                {% for error in errors %}
                <div class="flash-banner warning-message">
                    <span class="flash-banner-text">{{ error }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="auth-form" method="post" action="{{ base_path }}/register">
                <label class="field-label" for="username">{{ t('auth.field.username') }}</label>
                <input class="form-control" id="username" name="username" type="text" autocomplete="username"
                    value="{{ username | default('') }}" required autofocus>

                <label class="field-label" for="email">{{ t('auth.field.email') }} <span class="field-optional">{{ t('auth.field.optional') }}</span></label>
                <input class="form-control" id="email" name="email" type="email" autocomplete="email"
                    value="{{ email | default('') }}">

                <label class="field-label" for="password">{{ t('auth.field.password') }}</label>
                <input class="form-control" id="password" name="password" type="password"
                    autocomplete="new-password" required>

                <label class="field-label" for="password_confirm">{{ t('auth.field.confirm_password') }}</label>
                <input class="form-control" id="password_confirm" name="password_confirm" type="password"
                    autocomplete="new-password" required>

                <button class="btn btn-primary auth-submit" type="submit">{{ t('auth.action.create_account') }}</button>
            </form>

            <p class="auth-switch">{{ t('auth.switch.have_account') }} <a href="{{ base_path }}/login">{{ t('auth.switch.log_in') }}</a>.</p>
        </div>
    </main>
</body>

</html>
