<form hx-post="{{ base_path }}/recipes/edit-image/{{ recipe.id }}" hx-target="#recipe-image" hx-swap="innerHTML" class="inline-form">
    <div class="form-group">
        <label for="image_url">{{ t('recipe.field.image_url') }}</label>
        <input type="text" id="image_url" name="image_url" value="{{ recipe.image_url or '' }}" class="form-control" placeholder="https://…" autofocus />
        <p class="section-hint">{{ t('recipe.edit.image_hint') }}</p>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-sm" title="{{ t('recipe.edit.aria.save_image') }}" aria-label="{{ t('recipe.edit.aria.save_image') }}">{{ t('recipe.edit.action.save_image') }}</button>
        <button type="button"
            hx-post="{{ base_path }}/recipes/edit-image/{{ recipe.id }}"
            hx-target="#recipe-image"
            hx-swap="innerHTML"
            hx-vals='{"image_url": ""}'
            class="btn btn-secondary btn-sm"
            title="{{ t('recipe.edit.aria.clear_image') }}"
            aria-label="{{ t('recipe.edit.aria.clear_image') }}">{{ t('recipe.edit.action.clear_image') }}</button>
    </div>
</form>
