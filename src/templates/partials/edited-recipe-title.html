<h2 class="recipe-title-display">{{ recipe.name }}</h2>
<button hx-get="/recipes/title-editor/{{ recipe.id }}" hx-target="#recipe-title" hx-swap="innerHTML"
    class="btn btn-ghost btn-sm" type="button">
    Edit title
</button>
{% if messages %}
<div class="messages">
    {% for message in messages %}
    <p class="single-message">{{ message }}</p>
    {% endfor %}
</div>
{% endif %}
