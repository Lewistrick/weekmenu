<h2 class="heading">{{ recipe.name }}</h2>
<button hx-get="/recipes/title-editor/{{ recipe.id }}" hx-target="#recipe-title" hx-swap="innerHTML"
    class="btn btn--icon">✏️</button>
{% if messages %}
<div class="notices">
    {% for message in messages %}
    <p class="notice">{{ message }}</p>
    {% endfor %}
</div>
{% endif %}
