<div class="ingredient-input">
    <input type="text" name="quantity[]" class="form-control" placeholder="{{ t('ingredient.placeholder.quantity') }}" required>
    <input type="text" name="unit[]" class="form-control" placeholder="{{ t('ingredient.placeholder.unit') }}" required>
    <input type="text" name="ingredient_name[]" class="form-control" placeholder="{{ t('ingredient.placeholder.name') }}" required>
    <button type="button" class="btn btn-ghost btn-sm btn-danger"
        onclick="this.closest('.ingredient-input').remove()">
        {{ t('ingredient.action.remove_line') }}
    </button>
</div>
