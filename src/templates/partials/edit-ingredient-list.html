<div id="recipe-ingredients">
    {% for ingredient in ingredients %}
    {% with recipe_id=recipe.id %}
    {% include "partials/ingredient-row.html" %}
    {% endwith %}
    {% endfor %}
    <button hx-get="/recipes/{{ recipe.id }}/ingredients/add" hx-target="#add-ingredient-form" hx-swap="innerHTML"
        class="btn btn-sm icon-btn icon-action-btn" type="button" title="Add ingredient" aria-label="Add ingredient">
        ➕
    </button>
    <div id="add-ingredient-form"></div>
</div>
{% if messages %}
<div class="messages">
    {% for message in messages %}
    <p class="single-message">{{ message }}</p>
    {% endfor %}
</div>
{% endif %}
