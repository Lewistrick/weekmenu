<div id="recipe-ingredients">
    {% for ingredient in ingredients %}
    {% with recipe_id=recipe.id %}
    {% include "partials/ingredient-row.html" %}
    {% endwith %}
    {% endfor %}
    <button hx-get="{{ base_path }}/recipes/{{ recipe.id }}/ingredients/add" hx-target="#add-ingredient-form" hx-swap="innerHTML"
        class="btn btn-sm icon-btn icon-action-btn" type="button" title="{{ t('ingredient.aria.add') }}" aria-label="{{ t('ingredient.aria.add') }}">
        ➕
    </button>
    <div id="add-ingredient-form"></div>
    {% with message_scope="recipe-ingredients" %}
    {% include "partials/flash-messages.html" %}
    {% endwith %}
</div>
