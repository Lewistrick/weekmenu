<div class="status" id="recipe-status-{{ recipe.id }}" aria-label="recipe metadata">
    <span class="pill">
        {% if recipe.private %}🔒 Private{% else %}🌐 Public{% endif %}
    </span>
    <span class="pill">
        {% if recipe.enabled %}✅ Enabled{% else %}⏸️ Disabled{% endif %}
    </span>
</div>
