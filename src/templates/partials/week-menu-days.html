{% for day_row in days %}
<article class="week-menu-day" id="week-menu-day-{{ day_row.day }}">
    <div class="week-menu-day-primary">
        <div class="week-menu-move">
            <button type="button" class="btn btn-sm icon-btn week-menu-move-btn"
                hx-post="/week-menu/{{ day_row.day }}/move/up" hx-target="#week-menu-panel" hx-swap="innerHTML"
                title="{{ t('week_menu.day.aria.move_up_short') }}" aria-label="{{ t('week_menu.day.aria.move_up', day_label=t('day.' ~ day_row.day)) }}" {% if loop.first %}disabled{% endif %}>
                ▲
            </button>
            <button type="button" class="btn btn-sm icon-btn week-menu-move-btn"
                hx-post="/week-menu/{{ day_row.day }}/move/down" hx-target="#week-menu-panel" hx-swap="innerHTML"
                title="{{ t('week_menu.day.aria.move_down_short') }}" aria-label="{{ t('week_menu.day.aria.move_down', day_label=t('day.' ~ day_row.day)) }}" {% if loop.last %}disabled{% endif %}>
                ▼
            </button>
        </div>

        <div class="week-menu-day-info">
            <span class="week-menu-day-title">{{ t('day.' ~ day_row.day) }}</span>
            {% if day_row.recipe %}
            <a href="/recipes/view/{{ day_row.recipe.id }}" class="week-menu-recipe-link">
                #{{ day_row.recipe.id }} {{ day_row.recipe.name }}
            </a>
            {% else %}
            <span class="search-placeholder">{{ t('week_menu.day.no_recipe') }}</span>
            {% endif %}
        </div>
    </div>

    <div class="week-menu-day-secondary">
        <div class="week-menu-day-servings">
            <label class="field-label" for="servings-{{ day_row.day }}">{{ t('common.servings') }}</label>
            <input id="servings-{{ day_row.day }}" class="form-control week-menu-servings-input" type="number" min="1"
                name="servings" value="{{ day_row.servings }}" hx-post="/week-menu/{{ day_row.day }}/servings"
                hx-trigger="change" hx-target="#week-menu-panel" hx-swap="innerHTML"
                aria-label="{{ t('week_menu.day.aria.servings_for', day_label=t('day.' ~ day_row.day)) }}">
        </div>

        <div class="week-menu-day-actions">
            <button type="button" class="btn btn-sm icon-btn icon-action-btn{% if day_row.pinned %} icon-btn--active{% endif %}"
                hx-post="/week-menu/{{ day_row.day }}/pin" hx-target="#week-menu-panel" hx-swap="innerHTML"
                title="{% if day_row.pinned %}{{ t('week_menu.day.unpin') }}{% else %}{{ t('week_menu.day.pin') }}{% endif %}"
                aria-label="{% if day_row.pinned %}{{ t('week_menu.day.unpin') }}{% else %}{{ t('week_menu.day.pin') }}{% endif %}">
                📌
            </button>
            <button type="button" class="btn btn-sm icon-btn icon-action-btn"
                hx-post="/week-menu/{{ day_row.day }}/clear" hx-target="#week-menu-panel" hx-swap="innerHTML"
                title="{{ t('week_menu.day.aria.clear') }}" aria-label="{{ t('week_menu.day.aria.clear') }}">
                🗑️
            </button>
            <details class="week-menu-search-toggle">
                <summary class="btn btn-sm icon-btn icon-action-btn" title="{{ t('week_menu.day.aria.search') }}" aria-label="{{ t('week_menu.day.aria.search') }}">🔎</summary>
                <div class="week-menu-day-search">
                    <label class="field-label" for="search-{{ day_row.day }}">{{ t('week_menu.day.search_label') }}</label>
                    <input id="search-{{ day_row.day }}" class="form-control" type="search" name="search"
                        placeholder="{{ t('common.placeholder.search_recipe') }}" hx-get="/week-menu/{{ day_row.day }}/search"
                        hx-include="#week-menu-search-include-public"
                        hx-trigger="keyup changed delay:200ms, change from:#week-menu-search-include-public"
                        hx-target="#search-results-{{ day_row.day }}" hx-swap="innerHTML">
                    <div id="search-results-{{ day_row.day }}" class="week-menu-search-results"></div>
                </div>
            </details>
        </div>
    </div>
</article>
{% endfor %}
