<article class="manage-shop-ingredient-tile" id="manage-shop-assignment-{{ row.ingredient.id }}">
    <div class="manage-shop-ingredient-header">
        <span class="manage-shop-ingredient">{{ row.ingredient.name }}</span>
        <div class="manage-shop-ingredient-meta">
            <span class="manage-shop-recipe-count">
                {{ t('shops.assignments.in_recipes', count=row.recipe_count) }}
            </span>
            {% if row.recipe_count == 0 %}
            <button type="button" class="btn btn-sm icon-btn"
                hx-delete="/shops/ingredients/{{ row.ingredient.id }}"
                hx-target="#shop-assignments" hx-swap="outerHTML"
                title="{{ t('shops.assignments.aria.delete_unused') }}" aria-label="{{ t('shops.assignments.aria.delete_unused') }}">
                🗑️
            </button>
            {% endif %}
        </div>
    </div>
    <div class="shop-chip-row" role="group" aria-label="{{ t('shops.assignments.aria.shop_for', ingredient_name=row.ingredient.name) }}">
        <form hx-post="/shops/assignments" hx-target="#shop-assignments" hx-swap="outerHTML"
            class="shop-chip-form">
            <input type="hidden" name="ingredient_id" value="{{ row.ingredient.id }}">
            <input type="hidden" name="shop_id" value="">
            <button type="submit" class="shop-chip-btn shop-chip-btn--clear{% if row.shop_id is none %} shop-chip-btn--active{% endif %}"
                title="{{ t('shops.assignments.aria.unassigned') }}" aria-label="{{ t('shops.assignments.aria.unassigned') }}">—</button>
        </form>
        {% for shop in shops %}
        <form hx-post="/shops/assignments" hx-target="#shop-assignments" hx-swap="outerHTML"
            class="shop-chip-form">
            <input type="hidden" name="ingredient_id" value="{{ row.ingredient.id }}">
            <input type="hidden" name="shop_id" value="{{ shop.id }}">
            <button type="submit" class="shop-chip-btn{% if row.shop_id == shop.id %} shop-chip-btn--active{% endif %}"
                style="color: {{ shop.foreground_color }}; background-color: {{ shop.background_color }};"
                title="{{ shop.name }}" aria-label="{{ shop.name }}">
                {{ shop.letter }}
            </button>
        </form>
        {% endfor %}
    </div>
</article>
