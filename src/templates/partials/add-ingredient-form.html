<form class="inline-form" hx-post="/recipes/{{ recipe_id }}/ingredients/add" hx-target="#recipe-ingredients"
    hx-swap="outerHTML">
    <div class="form-group">
        <div class="ingredient-input">
            <input type="text" name="quantity" placeholder="Quantity" required />
            <input type="text" name="unit" placeholder="Unit" required />
            <input type="text" name="ingredient" placeholder="Name" required />
            <button type="submit" class="btn btn-primary btn-sm">Add</button>
            <button type="button" class="btn btn-ghost btn-sm" hx-get="/elements/empty/div/add-ingredient-form"
                hx-target="#add-ingredient-form" hx-swap="innerHTML">
                Cancel
            </button>
        </div>
    </div>
</form>
