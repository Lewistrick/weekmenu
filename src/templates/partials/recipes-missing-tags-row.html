<article class="form-panel recipes-missing-tags-row" id="recipes-missing-tags-row-{{ row.recipe.id }}">
    <a href="{{ base_path }}/recipes/view/{{ row.recipe.id }}" class="recipe-link">#{{ row.recipe.id }} {{ row.recipe.name }}</a>
    <div class="recipes-missing-tags-groups">
        <span class="section-hint">{{ t('recipes_missing_tags.missing_groups') }}</span>
        {% for group in row.missing_groups %}
        <div id="missing-tags-slot-{{ row.recipe.id }}-{{ group.id }}" class="missing-tags-group-slot">
            <button
                type="button"
                class="missing-tags-group-trigger"
                hx-get="{{ base_path }}/recipes/missing-tags/{{ row.recipe.id }}/groups/{{ group.id }}/edit"
                hx-target="#missing-tags-slot-{{ row.recipe.id }}-{{ group.id }}"
                hx-swap="outerHTML"
                title="{{ t('recipes_missing_tags.aria.edit_group', group_name=group.name) }}"
                aria-label="{{ t('recipes_missing_tags.aria.edit_group', group_name=group.name) }}"
            >
                <span class="tag-group-chip tag-group-chip--small"
                    style="--tag-bg: {{ group.background_color }}; --tag-fg: {{ group.foreground_color }};">
                    {{ group.name }}
                </span>
            </button>
        </div>
        {% endfor %}
    </div>
</article>
