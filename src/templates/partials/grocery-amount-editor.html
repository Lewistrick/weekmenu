<form class="grocery-amount-form" method="post"
    action="/week-menu/grocery-list/item/{{ item.ingredient_id }}/{{ item.unit }}"
    hx-post="/week-menu/grocery-list/item/{{ item.ingredient_id }}/{{ item.unit }}"
    hx-target="#grocery-amount-{{ item.ingredient_id }}-{{ item.unit }}"
    hx-swap="innerHTML">
    <input type="hidden" name="old_unit" value="{{ item.unit }}">
    <input class="form-control grocery-amount-input" type="number" name="quantity"
        min="0.01" step="any" value="{{ item.quantity }}" required
        aria-label="Quantity for {{ item.name }}">
    <select class="form-control grocery-unit-select" name="unit" required
        aria-label="Unit for {{ item.name }}">
        {% set unit_abbrevs = units | map(attribute='abbrev') | list %}
        {% if item.unit not in unit_abbrevs %}
        <option value="{{ item.unit }}" selected>{{ item.unit }}</option>
        {% endif %}
        {% for unit in units %}
        <option value="{{ unit.abbrev }}" {% if unit.abbrev == item.unit %}selected{% endif %}>
            {{ unit.abbrev }}
        </option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn-sm btn-primary" title="Save amount" aria-label="Save amount">✓</button>
    <button type="button" class="btn btn-sm icon-btn"
        hx-get="/week-menu/grocery-list/item/{{ item.ingredient_id }}/{{ item.unit }}/display"
        hx-target="#grocery-amount-{{ item.ingredient_id }}-{{ item.unit }}"
        hx-swap="innerHTML"
        title="Cancel edit" aria-label="Cancel edit">
        ✕
    </button>
</form>
