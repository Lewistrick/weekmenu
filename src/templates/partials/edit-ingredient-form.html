<form class="inline-form" hx-put="{{ base_path }}/recipes/{{ recipe_ingredient.recipe_id }}/ingredients/{{ recipe_ingredient.id }}/edit"
    hx-target="#edit-ingredient-{{ recipe_ingredient.id }}" hx-swap="outerHTML">
    <div class="form-group">
        <div class="ingredient-input">
            <input type="text" name="quantity" placeholder="{{ t('ingredient.placeholder.quantity') }}" value="{{ recipe_ingredient.quantity }}" required />
            <input type="text" name="unit" placeholder="{{ t('ingredient.placeholder.unit') }}" value="{{ recipe_ingredient.unit.abbrev }}" required />
            <input type="text" name="ingredient" placeholder="{{ t('ingredient.placeholder.name') }}" value="{{ recipe_ingredient.ingredient.name }}"
                required />
            <button type="submit" class="btn btn-primary btn-sm">{{ t('common.save') }}</button>
            <button type="button" class="btn btn-sm icon-btn icon-action-btn"
                hx-get="{{ base_path }}/recipes/{{ recipe_ingredient.recipe_id }}/ingredients/{{ recipe_ingredient.id }}"
                hx-target="#edit-ingredient-{{ recipe_ingredient.id }}" hx-swap="outerHTML"
                title="{{ t('ingredient.aria.cancel_edit') }}" aria-label="{{ t('ingredient.aria.cancel_edit') }}">
                ✕
            </button>
        </div>
    </div>
</form>
