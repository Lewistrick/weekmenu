<div class="recipe-description recipe-description-display">{{ recipe.description | markdown | safe }}</div>
<button hx-get="{{ base_path }}/recipes/desc-editor/{{ recipe.id }}" hx-target="#recipe-desc" hx-swap="innerHTML"
    class="btn btn-secondary btn-sm" type="button" title="{{ t('recipe.edit.aria.edit_description') }}" aria-label="{{ t('recipe.edit.aria.edit_description') }}">{{ t('recipe.edit.action.edit_description') }}</button>
{% with message_scope="recipe-desc" %}
{% include "partials/flash-messages.html" %}
{% endwith %}
