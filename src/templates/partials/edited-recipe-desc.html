<button hx-get="/recipes/desc-editor/{{ recipe.id }}" hx-target="#recipe-desc" hx-swap="innerHTML"
    class="btn btn--icon">✏️</button>
<p>{{ recipe.description }}</p>
{% if messages %}
<div class="notices">
    {% for message in messages %}
    <p class="notice">{{ message }}</p>
    {% endfor %}
</div>
{% endif %}
