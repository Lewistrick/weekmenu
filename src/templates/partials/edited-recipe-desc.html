<div class="recipe-description-display">{{ recipe.description }}</div>
<button hx-get="/recipes/desc-editor/{{ recipe.id }}" hx-target="#recipe-desc" hx-swap="innerHTML"
    class="btn btn-ghost btn-sm" type="button">
    Edit description
</button>
{% if messages %}
<div class="messages">
    {% for message in messages %}
    <p class="single-message">{{ message }}</p>
    {% endfor %}
</div>
{% endif %}
