<div class="grocery-inline-confirm-wrap">
    <button type="button" class="btn btn-sm grocery-inline-confirm-trigger grocery-clear-list-trigger"
        id="{{ trigger_id }}" data-confirm-id="{{ confirm_id }}"
        title="{{ trigger_label }}" aria-label="{{ trigger_label }}">
        <span class="grocery-clear-list-icon" aria-hidden="true">{{ trigger_icon | default("🗑") }}</span>
        <span>{{ trigger_label }}</span>
    </button>
    <div class="grocery-inline-confirm" id="{{ confirm_id }}" hidden>
        <span class="grocery-inline-confirm-label">{{ confirm_label }}</span>
        <form method="post" hx-post="{{ confirm_action }}" hx-target="#grocery-list-body" hx-swap="outerHTML show:none"
            class="grocery-bulk-form">
            <button type="submit" class="shop-chip-btn shop-chip-btn--warn"
                title="{{ t('common.confirm') }}" aria-label="{{ t('common.confirm') }}">
                ✓
            </button>
        </form>
        <button type="button" class="shop-chip-btn shop-chip-btn--clear grocery-inline-confirm-cancel"
            data-confirm-id="{{ confirm_id }}" data-trigger-id="{{ trigger_id }}"
            title="{{ t('common.cancel') }}" aria-label="{{ t('common.cancel') }}">
            ✕
        </button>
    </div>
</div>
