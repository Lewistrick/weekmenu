<button type="button" class="grocery-item-amount"
    hx-get="{{ base_path }}/week-menu/grocery-list/item/{{ item.ingredient_id }}/{{ item.unit }}/edit"
    hx-target="#grocery-amount-{{ item.ingredient_id }}-{{ item.unit }}"
    hx-swap="innerHTML"
    title="{{ t('grocery.aria.edit_amount') }}" aria-label="{{ t('grocery.aria.edit_amount_for', item_name=item.name) }}">
    {{ "%g" | format(item.quantity) }} {{ item.unit }}
</button>
