<div class="form-group" id="recipe-status-controls">
    <div class="recipe-status-editor">
        <form hx-post="{{ base_path }}/recipes/{{ recipe.id }}/toggle-private" hx-trigger="change" hx-target="#recipe-status-controls" hx-swap="outerHTML"
            class="recipe-status-toggle">
            <label class="switch-row">
                <span>{{ t('recipe.status.public_recipe') }}</span>
                <label class="switch">
                    <input type="checkbox" name="private" value="true" {% if not recipe.private %}checked{% endif %}>
                    <span class="slider"></span>
                </label>
            </label>
        </form>
        <form hx-post="{{ base_path }}/recipes/{{ recipe.id }}/toggle-enabled" hx-trigger="change" hx-target="#recipe-status-controls" hx-swap="outerHTML"
            class="recipe-status-toggle">
            <label class="switch-row">
                <span>{{ t('recipe.status.enabled_recipe') }}</span>
                <label class="switch">
                    <input type="checkbox" name="enabled" value="true" {% if recipe.enabled %}checked{% endif %}>
                    <span class="slider"></span>
                </label>
            </label>
        </form>
    </div>
</div>
