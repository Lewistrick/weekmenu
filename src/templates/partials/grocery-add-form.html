<div id="grocery-add-form">
    <section class="recipe-section grocery-add-panel">
        <div class="section-heading">
            <h2 class="section-title">Add groceries</h2>
            <form hx-post="/week-menu/grocery-list/add-weekly" hx-target="#grocery-list-body"
                hx-swap="none" class="grocery-add-weekly-form">
                <button type="submit" class="btn btn-secondary btn-sm">🧺 Add weekly groceries</button>
            </form>
        </div>
        <form hx-post="/week-menu/grocery-list/add" hx-target="#grocery-list-body" hx-swap="none"
            class="inline-form grocery-add-form">
            <div class="form-group">
                <div class="ingredient-input">
                    <input type="text" name="ingredient" class="form-control" placeholder="Name" required />
                    <input type="number" name="quantity" class="form-control" placeholder="Amount" min="0.01"
                        step="any" required />
                    <select name="unit" class="form-control grocery-unit-select" required aria-label="Unit">
                        {% for unit in units %}
                        <option value="{{ unit.abbrev }}">{{ unit.abbrev }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-primary btn-sm">Add</button>
                </div>
            </div>
        </form>
    </section>
</div>
