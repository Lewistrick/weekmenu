<div class="grocery-generate-wrap">
    {% if grocery_list_has_items %}
    <button type="button" class="btn btn-action btn-action--grocery grocery-generate-trigger"
        id="grocery-generate-trigger" data-confirm-id="grocery-generate-choices"
        title="{{ t('grocery.generate.aria') }}" aria-label="{{ t('grocery.generate.aria') }}">
        <span class="btn-action-icon" aria-hidden="true">🛒</span>
        <span>{{ t('grocery.generate.action') }}</span>
    </button>
    <div class="grocery-generate-choices" id="grocery-generate-choices" hidden>
        <span class="grocery-inline-confirm-label">{{ t('grocery.generate.confirm') }}</span>
        <form method="post" action="{{ base_path }}/week-menu/grocery-list/generate" class="grocery-bulk-form">
            <input type="hidden" name="mode" value="replace">
            <button type="submit" class="btn btn-sm btn-ghost grocery-generate-choice"
                title="{{ t('grocery.generate.replace.title') }}" aria-label="{{ t('grocery.generate.replace.aria') }}">
                {{ t('grocery.generate.replace') }}
            </button>
        </form>
        <form method="post" action="{{ base_path }}/week-menu/grocery-list/generate" class="grocery-bulk-form">
            <input type="hidden" name="mode" value="merge">
            <button type="submit" class="btn btn-sm btn-ghost grocery-generate-choice"
                title="{{ t('grocery.generate.add.title') }}" aria-label="{{ t('grocery.generate.add.aria') }}">
                {{ t('grocery.generate.add') }}
            </button>
        </form>
        <button type="button" class="shop-chip-btn shop-chip-btn--clear grocery-generate-cancel"
            data-confirm-id="grocery-generate-choices" data-trigger-id="grocery-generate-trigger"
            title="{{ t('common.cancel') }}" aria-label="{{ t('common.cancel') }}">
            ✕
        </button>
    </div>
    {% else %}
    <form method="post" action="{{ base_path }}/week-menu/grocery-list/generate" class="grocery-generate-form">
        <input type="hidden" name="mode" value="replace">
        <button type="submit" class="btn btn-action btn-action--grocery"
            title="{{ t('grocery.generate.aria') }}" aria-label="{{ t('grocery.generate.aria') }}">
            <span class="btn-action-icon" aria-hidden="true">🛒</span>
            <span>{{ t('grocery.generate.action') }}</span>
        </button>
    </form>
    {% endif %}
</div>
