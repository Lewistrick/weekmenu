{% extends "base.html" %}

{% block title %}Find recipe{% endblock %}

{% block content %}
<div class="content-page">
    <header class="page-header">
        <h1 class="page-title-main">Find recipe</h1>
        <p class="page-lead">Search your cookbook by recipe name.</p>
    </header>

    <div class="search-panel">
        <label class="field-label" for="recipe-search-input">Recipe name</label>
        <input id="recipe-search-input" class="form-control" type="search" name="search"
            placeholder="Start typing to search…" hx-get="/recipes/search-recipe" hx-trigger="keyup changed delay:200ms"
            hx-target="#search-results" hx-swap="innerHTML">

        <div id="search-results" class="search-results-panel">
            <p class="search-placeholder">Results will appear here as you type.</p>
        </div>
    </div>
</div>
{% endblock %}
