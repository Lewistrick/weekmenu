{% extends "base.html" %}

{% block title %}Search recipes{% endblock %}

{% block content %}
<h1>Recipe Search</h1>
<div class="field">
    <input type="search" name="search" placeholder="Search for recipes" hx-get="/recipes/search-recipe"
        hx-trigger="keyup changed delay:200ms" hx-target="#search-results" hx-swap="innerHTML">
</div>

<div id="search-results"></div>
{% endblock %}
