<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Weekmenu{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Weekmenu</a>
        <div class="navbar-links">
            <a href="/recipes/search" class="nav-link">Find recipe</a>
            <a href="/week-menu" class="nav-link">Week menu</a>
            <a href="/recipes/add" class="nav-link">Add recipe</a>
            <a href="/tags/manage" class="nav-link">Tag groups</a>
            <a href="/recipes/random" class="nav-link">Random recipe</a>
        </div>
        <div class="navbar-right">
            <a href="/recipes/user-profile" class="nav-link nav-link--muted">Profile</a>
        </div>
    </nav>

    {% if messages %}
    <div class="container messages">
        {% for message in messages %}
        <p class="single-message">{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}
    {% if warnings %}
    <div class="container messages">
        {% for warning in warnings %}
        <p class="warning-message">{{ warning }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
