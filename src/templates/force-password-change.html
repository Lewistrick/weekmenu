<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('app.title.force_password') }}</title>
    <link rel="icon" type="image/png" href="{{ base_path }}/static/favicon.png">
    <link rel="stylesheet" href="{{ base_path }}/static/style.css">
</head>

<body>
    <main class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">{{ t('app.name') }}</h1>
            <p class="auth-subtitle">{{ t('auth.force_password.subtitle') }}</p>

            {% if warnings %}
            <div class="messages">
                {% for warning in warnings %}
                <div class="flash-banner warning-message">
                    <span class="flash-banner-text">{{ warning }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="auth-form" method="post" action="{{ base_path }}/profile/password">
                <label class="field-label" for="new_password">{{ t('profile.field.new_password') }}</label>
                <input class="form-control" id="new_password" name="new_password" type="password"
                    autocomplete="new-password" required autofocus>

                <label class="field-label" for="new_password_confirm">{{ t('profile.field.confirm_new_password') }}</label>
                <input class="form-control" id="new_password_confirm" name="new_password_confirm" type="password"
                    autocomplete="new-password" required>

                <button class="btn btn-primary auth-submit" type="submit">{{ t('auth.force_password.action') }}</button>
            </form>

            <form class="auth-form" method="post" action="{{ base_path }}/logout">
                <button class="btn btn-secondary auth-submit" type="submit">{{ t('nav.logout') }}</button>
            </form>
        </div>
    </main>
</body>

</html>
