{% if recipes %}
<h2 class="section-title">{{ t('search.results.title') }}</h2>
<ul class="search-result-list">
    {% for recipe in recipes %}
    <li>
        <button hx-get="/recipes/view/{{ recipe.id }}" hx-target="body" class="search-result-item" type="button">
            <span class="search-result-id">#{{ recipe.id }}</span>
            <span class="search-result-name">{{ recipe.name }}</span>
        </button>
    </li>
    {% endfor %}
</ul>
{% else %}
<p class="search-placeholder">{{ t('search.results.empty') }}</p>
{% endif %}
