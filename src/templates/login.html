<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('app.title.login') }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">{{ t('app.name') }}</h1>
            <p class="auth-subtitle">{{ t('auth.login.subtitle') }}</p>

            {% if errors %}
            <div class="messages">
                {% for error in errors %}
                <div class="flash-banner warning-message">
                    <span class="flash-banner-text">{{ error }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="auth-form" method="post" action="/login">
                <label class="field-label" for="username">{{ t('auth.field.username') }}</label>
                <input class="form-control" id="username" name="username" type="text" autocomplete="username"
                    value="{{ username | default('') }}" required autofocus>

                <label class="field-label" for="password">{{ t('auth.field.password') }}</label>
                <input class="form-control" id="password" name="password" type="password"
                    autocomplete="current-password" required>

                <button class="btn btn-primary auth-submit" type="submit">{{ t('auth.action.login') }}</button>
            </form>

            <p class="auth-switch">{{ t('auth.switch.no_account') }} <a href="/register">{{ t('auth.switch.create_one') }}</a>.</p>
        </div>
    </main>
</body>

</html>
