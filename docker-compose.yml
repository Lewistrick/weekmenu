services:
  app:
    build: .
    ports:
      # Localhost only: reach the app via Tailscale Serve, not the public IP.
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Bind a host *file* (not a named volume at this path). A named volume
      # mounted on a missing file path becomes a directory and breaks SQLite.
      - ./data/recipes.sqlite3:/app/src/recipes.sqlite3
    restart: unless-stopped

  # PostgreSQL is prepared for a future switch from SQLite. The app still uses
  # SQLite until DATABASE_URL is wired in src/db_config.py.
  #
  # Enable with: docker compose --profile postgres up
  postgres:
    profiles: [postgres]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weekmenu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-weekmenu}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weekmenu} -d ${POSTGRES_DB:-weekmenu}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg-data:
