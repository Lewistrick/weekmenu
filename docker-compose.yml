services:
  app:
    build: .
    expose:
      - "8000"
    ports:
      # Localhost-only direct access for debugging; public traffic goes via Caddy :80.
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH:-/weekmenu}
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      # Localhost-only access for one-off migrations and debugging.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weekmenu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-weekmenu}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weekmenu} -d ${POSTGRES_DB:-weekmenu}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg-data:
