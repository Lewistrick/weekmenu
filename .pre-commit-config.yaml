repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: format-css
        name: format CSS
        entry: uv run python scripts/format_css.py
        language: system
        files: \.css$
